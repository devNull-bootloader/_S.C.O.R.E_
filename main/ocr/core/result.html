<!DOCTYPE html>
<html>
<head>
    <title>OCR Result</title>
</head>
<body>

    <h1>Res:</h1>
    
    <pre id="output"></pre>

    <br>
    <a href="index.html">Scan New Instance</a>

    <script>
  
        const savedText = localStorage.getItem('ocrResult');
        
   
        const outputElement = document.getElementById('output');

        if (savedText) {
   
            outputElement.innerText = savedText;
        } else {
            outputElement.innerText = "Error";
        }
    </script>

</body>
</html>
